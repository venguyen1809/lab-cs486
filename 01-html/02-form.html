<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
  </head>
  <body>
    <main>
      <!-- Add your code here -->

      <h1>Roth IRA Calculator</h1>
      <form action=".submitform">
        <div>
          <label for="balance">Balance ($)</label> <br>
          <input type="text" name="balance" id="balance">
        </div>
        <br>
        <div>
          <label for="contribution">Annual Contribution ($)</label> <br>
          <input type="text" name="contribution" id="contribution">
        </div>

        <br>

        <fieldset>
          <legend>Maximize contribution?</legend>
          <input type="radio" name="contribution" id="yes" value="yes">
          <label for="yes">Yes</label>
          <input type="radio" name="contribution" id="no" value="no">
          <label for="no">No</label>

        </fieldset>
        <br>

        <div>
          <label for="rate">Expected rate of return (%)</label> <br>
          <input type="number" name="rate" id="rate">
        </div>
        <br>

        <div>
          <label for="age">Current age</label><br>
          <input type="number" name="age" id="age">
        </div>
        <br>

        <div>
          <label for="retire">Retirement age</label><br>
          <input type="number" name="retire" id="retire">
        </div>
        <br>

        <div>
          <label for="tax">Marginal tax rate (%)</label><br>
          <input type="number" name="tax" id="tax">
        </div>
        <br>

        <div>
          <input type="submit" value="Calculator">
          <input type="reset" value="Reset">
        </div>
        <br>

        <p>This exercise is a simplified version of the Roth IRA Calculator at <a href="https://calculator.net"> Calculator.net</a></p>

      </form>

    </main>
  </body>
</html>
