<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body class="bg-light">
    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card shadow">
            <div class="card-body p-4">
              <h1 class="text-center mb-4">Roth IRA Calculator</h1>

              <form action=".submitform">
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label" for="balance">Balance ($)</label>
                    <input
                      class="form-control"
                      type="text"
                      name="balance"
                      id="balance"
                    />
                  </div>

                  <div class="col-12">
                    <label class="form-label" for="contribution"
                      >Annual Contribution ($)</label
                    >
                    <input
                      class="form-control"
                      type="text"
                      name="contribution"
                      id="contribution"
                    />
                  </div>

                  <fieldset class="col-12 border rounded p-3">
                    <legend class="float-none w-auto px-2 fs-6">
                      Maximize contribution?
                    </legend>

                    <div class="form-check form-check-inline">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="maximize"
                        id="yes"
                        value="yes"
                      />
                      <label class="form-check-label" for="yes">Yes</label>
                    </div>

                    <div class="form-check form-check-inline">
                      <input
                        class="form-check-input"
                        type="radio"
                        name="maximize"
                        id="no"
                        value="no"
                      />
                      <label class="form-check-label" for="no">No</label>
                    </div>
                  </fieldset>

                  <div class="col-12">
                    <label class="form-label" for="rate"
                      >Expected rate of return (%)</label
                    >
                    <input
                      class="form-control"
                      type="number"
                      name="rate"
                      id="rate"
                    />
                  </div>

                  <div class="col-12">
                    <label class="form-label" for="age">Current age</label>
                    <input
                      class="form-control"
                      type="number"
                      name="age"
                      id="age"
                    />
                  </div>

                  <div class="col-12">
                    <label class="form-label" for="retire"
                      >Retirement age</label
                    >
                    <input
                      class="form-control"
                      type="number"
                      name="retire"
                      id="retire"
                    />
                  </div>

                  <div class="col-12">
                    <label class="form-label" for="tax"
                      >Marginal tax rate (%)</label
                    >
                    <input
                      class="form-control"
                      type="number"
                      name="tax"
                      id="tax"
                    />
                  </div>

                  <div class="col-12 d-flex gap-2 justify-content-center mt-4">
                    <input
                      class="btn btn-primary"
                      type="submit"
                      value="Calculate"
                    />
                    <input
                      class="btn btn-secondary"
                      type="reset"
                      value="Reset"
                    />
                  </div>
                </div>

                <p class="text-center small mt-4 mb-0">
                  This exercise is a simplified version of the Roth IRA
                  Calculator at
                  <a href="https://calculator.net">Calculator.net</a>.
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
