<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Exercise 04 - Fetch</title>
    <link rel="stylesheet" href="04-fetch.css" />
  </head>
  <body>
    <main>
      <nav class="navbar">
        <h1 class="brand-logo">Pokedex</h1>
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="Search Pokémon..."
          aria-label="Search Pokémon"
        />
      </nav>

      <section id="pokemon-container" class="pokemon-container">
        <div class="loader-wrapper">
          <img src="loader.gif" alt="Loading Pokemon data" class="loader" />
          <p>Loading...</p>
        </div>
      </section>
    </main>

    <script src="04-fetch.js"></script>
  </body>
</html>
